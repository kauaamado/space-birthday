<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover the Astronomy Picture of the Day from the date you were born. Explore the cosmos through NASA's API.">
    <meta name="keywords" content="space, birthday, nasa, apod, astronomy, cosmos">
    <title>Space Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Main Navigation">
            <div class="logo-container">
                <img src="../assets/logo.png" alt="Space Birthday Logo" class="logo-img">
                <span class="logo-text">Space Birthday</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Space Birthday</h1>
            <p>Get to know the cosmic photo of the day of your birthday!</p>
        </section>

        <section class="search-controls">
            <label for="date-input">Select your birthday:</label>
            <input type="date" id="date-input" min="1995-06-16" aria-required="true">
            <button id="search-btn" aria-controls="result-container">Search</button>
        </section>

        <section id="result-container" aria-live="polite" aria-atomic="true"></section>
    </main>

    <template id="card-template">
        <article class="glass-card">
            <h2 class="card-title"></h2>
            <p class="card-date"></p>
            <div class="media-container"></div>
            <p class="card-explanation"></p>
        </article>
    </template>

    <script type="module" src="script.js"></script>

    <footer>
        <p>Space Birthday &copy; 2026</p>
    </footer>
</body>
</html>
